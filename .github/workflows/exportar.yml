name: Exportar Modelo para TFLite no Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências Limpas da Ultralytics
        run: |
          pip install --upgrade pip
          pip install ultralytics
          # Instala as ferramentas oficiais do Google para evitar o auto-update quebrado
          pip install ai-edge-litert litert-torch

      - name: Executar Exportação Oficial via CLI da Ultralytics
        run: |
          cd projetos/3-deteccao-mascaras
          # Executa direto pelo comando oficial da CLI para evitar travas de script local
          yolo export model=model.pt format=tflite imgsz=640

      - name: Mover e Renomear Arquivo Convertido
        run: |
          cd projetos/3-deteccao-mascaras
          # A Ultralytics cria uma pasta ou renomeia o arquivo. Vamos caçá-lo e garantir o nome correto.
          find . -name "*.tflite" -exec mv {} model.tflite \;
          ls -l model.tflite

      - name: Disponibilizar o modelo para Download
        uses: actions/upload-artifact@v4
        with:
          name: modelo-tflite-convertido
          path: projetos/3-deteccao-mascaras/model.tflite
          if-no-files-found: error